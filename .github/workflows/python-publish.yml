# This workflow will test, build, and publish a Python Package using Twine
name: Build, Test & Publish Python Package

on:
  push:
    branches:
      - release
      - main
  release:
    types: [published]
  pull_request:
    branches: [ main, release ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@34e11480e36e2a12c6ccba09aea0c3f35e8e02e4 # v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest==8.3.4 pytest-cov==6.0.0
        pip install -e .
    
    - name: Verify package installation
      run: |
        python -c "import airports.airport_data; print('Package imported successfully')"
        python -c "from airports import airport_data; print(f'Loaded {len(airport_data.airports)} airports')"
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=airports --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@34e11480e36e2a12c6ccba09aea0c3f35e8e02e4 # v4
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.x'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build==1.2.2 twine==6.0.1
    
    - name: Check for airports data file
      run: |
        if [ ! -f "airports/data/airports.gz" ]; then
          echo "Missing airports.gz file"
          echo "This file is required for the package to work."
          echo "Please ensure airports/data/airports.gz exists before publishing."
          exit 1
        else
          echo "Found airports.gz file"
          # Verify it's valid
          python scripts/generate_airports_gz.py --verify-only
        fi
    
    - name: Build package
      run: python -m build
    
    - name: Check package
      run: twine check dist/*
    
    - name: List package contents
      run: |
        echo "Package contents:"
        tar -tzf dist/*.tar.gz | head -20
        echo "..."
        echo "Package built successfully"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    # Publish to TestPyPI on main branch pushes or manual trigger
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/airports-py
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish package to TestPyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        print-hash: true

  publish-to-pypi:
    name: Publish to PyPI
    # Only publish to PyPI on release branch pushes
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/release')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/airports-py
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
